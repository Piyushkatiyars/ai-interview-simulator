# AI Interview Simulator - Docker Compose Configuration
version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview_simulator_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-interview_simulator}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://127.0.0.1:5173"]
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interview_network

  # MySQL Database (for local development)
  db:
    image: mysql:8.0
    container_name: interview_simulator_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-interview_simulator}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interview_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: interview_simulator_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - interview_network

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: interview_simulator_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interview_network

networks:
  interview_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
